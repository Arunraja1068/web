<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopEase Advanced</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{--primary:#4f46e5;--bg:#f8fafc;--card:#fff;--text:#1e293b}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:var(--bg);color:var(--text)}

nav{background:#fff;padding:15px 40px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 10px rgba(0,0,0,0.05)}
nav ul{display:flex;gap:20px;list-style:none}
nav a{text-decoration:none;color:var(--text)}

.cart-badge{background:var(--primary);color:#fff;padding:2px 8px;border-radius:12px;font-size:12px}

.hero{text-align:center;padding:50px;background:linear-gradient(120deg,#4f46e5,#06b6d4);color:white}

/* SEARCH */
.search-box{padding:20px;text-align:center}
.search-box input{padding:10px;width:60%;max-width:400px;border:1px solid #ddd;border-radius:6px}

.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:20px}
.product{background:#fff;padding:20px;border-radius:12px;box-shadow:0 6px 14px rgba(0,0,0,0.06)}
.product img{width:100%;border-radius:8px;height:180px;object-fit:cover}
.btn{width:100%;padding:10px;background:var(--primary);color:#fff;border:none;border-radius:6px;margin-top:10px;cursor:pointer}

.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);justify-content:center;align-items:center}
.modal-content{background:#fff;padding:20px;border-radius:12px;width:90%;max-width:400px}

.total{margin-top:10px;font-weight:600}
.remove{color:red;cursor:pointer;font-size:12px}

@media(max-width:600px){
nav{flex-direction:column;gap:10px}
.search-box input{width:90%}
}
</style>
</head>

<body>

<nav>
<h2>ShopEase</h2>
<ul>
<li><a href="#">Home</a></li>
<li><a href="#">Products</a></li>
<li><a id="cartBtn">Cart <span id="count" class="cart-badge">0</span></a></li>
</ul>
</nav>

<div class="hero">
<h1>Smart Shopping UI</h1>
<p>Now with real interactions</p>
</div>

<div class="search-box">
<input type="text" id="search" placeholder="Search products..." onkeyup="filterProducts()">
</div>

<section class="products" id="products"></section>

<div class="modal" id="modal">
<div class="modal-content">
<h3>Your Cart</h3>
<div id="cartItems"></div>
<p class="total" id="total"></p>
</div>
</div>

<script>
const data=[
{name:'Wireless Headphones',price:59,img:'wired earphone.jpeg'},
{name:'Smart Watch',price:120,img:'smart watch.jpeg'},
{name:'Bluetooth Speaker',price:40,img:'bluetooth speaker.jpeg'},
{name:'Laptop',price:899,img:'laptop.jpeg'},
{name:'Gaming Mouse',price:35,img:'gaming mouse.jpeg'},
{name:'Keyboard',price:70,img:'keyboard.jpeg'},
{name:'Smartphone',price:699,img:'samrt phone.jpeg'},
{name:'Camera',price:499,img:'camera.jpeg'}
];

let cart = JSON.parse(localStorage.getItem('cart')) || [];

const products=document.getElementById('products');
const count=document.getElementById('count');
const cartItems=document.getElementById('cartItems');
const total=document.getElementById('total');

function renderProducts(list){
products.innerHTML='';
list.forEach((p,i)=>{
products.innerHTML+=`
<div class="product">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>$${p.price}</p>
<button class="btn" onclick="add(${i})">Add to Cart</button>
<button class="btn" onclick="view(${i})" style="background:#06b6d4">View</button>
</div>`;
});
}

renderProducts(data);

function add(i){
cart.push(data[i]);
updateCart();
}

function updateCart(){
count.innerText=cart.length;
localStorage.setItem('cart', JSON.stringify(cart));
}

function render(){
if(cart.length===0){cartItems.innerHTML='Empty';total.innerText='';return}
let sum=0;
cartItems.innerHTML=cart.map((item,index)=>{
sum+=item.price;
return `<p>${item.name} - $${item.price} <span class="remove" onclick="removeItem(${index})">❌</span></p>`;
}).join('');

total.innerText='Total: $'+sum;
}

function removeItem(i){
cart.splice(i,1);
updateCart();
render();
}

function view(i){
  const product = data[i];
  document.body.innerHTML = `
  <div style="padding:20px;max-width:800px;margin:auto;">
    <button onclick="location.reload()" style="margin-bottom:20px;padding:8px 16px;">← Back</button>
    <img src="${product.img}" style="width:100%;border-radius:10px;max-height:400px;object-fit:cover">
    <h1 style="margin-top:20px;">${product.name}</h1>
    <p style="font-size:18px;margin:10px 0;">Price: $${product.price}</p>
    <p style="color:#555;">This is a high-quality ${product.name} with modern design and great performance. Perfect for daily use.</p>
    <button onclick="add(${i})" style="margin-top:20px;padding:12px 20px;background:#4f46e5;color:white;border:none;border-radius:6px;">Add to Cart</button>
  </div>`;
}

function filterProducts(){
let val=document.getElementById('search').value.toLowerCase();
let filtered=data.filter(p=>p.name.toLowerCase().includes(val));
renderProducts(filtered);
}

const modal=document.getElementById('modal');

document.getElementById('cartBtn').onclick=()=>{
modal.style.display='flex';
render();
}

window.onclick=(e)=>{
if(e.target===modal){modal.style.display='none'}
}

updateCart();
</script>

</body>
</html>
