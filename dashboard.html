<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professional Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      background: #f4f6f9;
      color: #333;
    }

    /* Sidebar */
    .sidebar {
      position: fixed;
      top: 0; left: 0;
      width: 220px;
      height: 100%;
      background: #0066ff;
      color: #fff;
      padding: 20px;
      box-shadow: 2px 0 6px rgba(0,0,0,0.1);
    }
    .sidebar h2 { margin-bottom: 30px; font-size: 1.4rem; }
    .sidebar ul { list-style: none; padding: 0; }
    .sidebar ul li { margin: 15px 0; }
    .sidebar ul li a {
      color: #fff; text-decoration: none; font-weight: 500; transition: 0.3s;
    }
    .sidebar ul li a:hover { color: #e9ecef; }

    /* Main Content */
    .main {
      margin-left: 240px;
      padding: 20px;
    }
    .topbar {
      background: #fff;
      padding: 15px 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .topbar h1 { font-size: 1.5rem; }

    /* Cards */
    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 20px;
    }
    .card {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.08);
      flex: 1;
      min-width: 250px;
    }
    .card h3 { margin-bottom: 10px; color: #0066ff; }

    /* Chart Container */
    .chart-container {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.08);
      margin-top: 20px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar {
        position: relative;
        width: 100%;
        height: auto;
        box-shadow: none;
      }
      .main { margin-left: 0; }
      .cards { flex-direction: column; }
    }
    /* Back to Portfolio Button */
.back-btn {
  display: inline-block;
  padding: 10px 20px;
  margin-top: 20px;
  background: #fff;
  color: #0066ff;
  border: 2px solid #fff;
  border-radius: 6px;
  font-weight: bold;
  text-align: center;
  transition: all 0.3s ease;
  text-decoration: none;
}

.back-btn:hover {
  background: #e9ecef;
  color: #004bb5;
}

  </style>
</head>
<body>

  <!-- Sidebar -->
  <!-- Sidebar -->
<div class="sidebar">
  <h2>Dashboard</h2>
  <ul>
    <li><a href="#">Overview</a></li>
    <li><a href="#">Analytics</a></li>
    <li><a href="#">Reports</a></li>
    <li><a href="#">Settings</a></li>
  </ul>

  <!-- Back to Portfolio Button -->
  <a href="http://127.0.0.1:5500/myportfolio.html" class="back-btn">Back to Portfolio</a>
</div>


  <!-- Main Content -->
  <div class="main">
    <div class="topbar">
      <h1>Welcome, Arun</h1>
      <button style="padding:8px 16px; background:#0066ff; color:#fff; border:none; border-radius:5px; cursor:pointer;">
        Logout
      </button>
    </div>

    <!-- Cards -->
    <div class="cards">
      <div class="card"><h3>Users</h3><p>1,245 Active</p></div>
      <div class="card"><h3>Sales</h3><p>$12,340 This Month</p></div>
      <div class="card"><h3>Performance</h3><p>98% Uptime</p></div>
    </div>

    <!-- Chart Section -->
    <div class="chart-container">
      <h3>Monthly Sales Trend</h3>
      <canvas id="salesChart"></canvas>
    </div>

    <div class="chart-container">
      <h3>User Growth</h3>
      <canvas id="usersChart"></canvas>
    </div>
  </div>

  <!-- JavaScript -->
  <script>
    // Sales Line Chart
    const ctx1 = document.getElementById('salesChart').getContext('2d');
    new Chart(ctx1, {
      type: 'line',
      data: {
        labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
        datasets: [{
          label: 'Sales ($)',
          data: [5000, 7000, 8000, 12000, 15000, 18000],
          borderColor: '#0066ff',
          backgroundColor: 'rgba(0,102,255,0.1)',
          fill: true,
          tension: 0.3
        }]
      }
    });

    // Users Bar Chart
    const ctx2 = document.getElementById('usersChart').getContext('2d');
    new Chart(ctx2, {
      type: 'bar',
      data: {
        labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
        datasets: [{
          label: 'Active Users',
          data: [200, 400, 600, 900, 1200, 1500],
          backgroundColor: '#4b0082'
        }]
      }
    });
  </script>

</body>
</html>
