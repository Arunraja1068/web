<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fully Responsive SaaS Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --primary:#4f46e5; --bg:#f1f5f9; --card:#fff; --text:#1e293b;
  --muted:#64748b; --success:#16a34a; --danger:#dc2626;
}

body.dark {
  --bg:#0f172a; --card:#1e293b; --text:#e2e8f0; --muted:#94a3b8;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:var(--bg);color:var(--text)}

.dashboard{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:linear-gradient(180deg,var(--primary),#312e81);
  color:white;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.sidebar h2{
  margin-bottom:20px;
  font-size:20px;
}

.sidebar a{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  border-radius:8px;
  color:#e0e7ff;
  text-decoration:none;
  transition:0.3s;
}

.sidebar a:hover{
  background:rgba(255,255,255,0.15);
  color:white;
}

.sidebar a.active{
  background:white;
  color:#4f46e5;
  font-weight:600;
}
.sidebar a{color:#e0e7ff;margin:12px 0;text-decoration:none}
.back-btn{
  margin-top:auto;
  padding:10px;
  background:rgba(255,255,255,0.15);
  text-align:center;
  border-radius:8px;
  color:white;
  text-decoration:none;
  font-weight:600;
  transition:0.3s;
  display:block;
  white-space:nowrap;
}

.back-btn:hover{
  background:white;
  color:#4f46e5;
}

/* MAIN */
.main{flex:1;padding:20px}
.topbar{
  display:flex;justify-content:space-between;align-items:center;
  background:var(--card);padding:15px;border-radius:10px
}

.user{display:flex;align-items:center;gap:10px}
.user img{border-radius:50%}
.toggle{cursor:pointer}

/* CARDS */
.cards{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;margin-top:20px
}
.card{background:var(--card);padding:15px;border-radius:10px}

/* CHARTS */
.charts{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;margin-top:20px
}
.chart{background:var(--card);padding:15px;border-radius:10px}

/* TABLE */
.table{margin-top:20px;background:var(--card);padding:15px;border-radius:10px;overflow-x:auto}
input{padding:8px;margin-bottom:10px;width:100%;border:1px solid #ddd;border-radius:6px}

table{width:100%;border-collapse:collapse;min-width:400px}
th,td{padding:10px;border-bottom:1px solid #eee}

/* RESPONSIVE */
@media (max-width: 900px){
  .dashboard{flex-direction:column}

  .sidebar{
    flex-direction:row;width:100%;overflow-x:auto;gap:10px
  }

  .sidebar h2{display:none}

  .back-btn{margin-top:0;white-space:nowrap}
}

@media (max-width: 600px){
  .topbar{flex-direction:column;align-items:flex-start;gap:10px}

  .user span{display:none}

  .card h2{font-size:20px}
}
</style>
</head>

<body>

<div class="dashboard">

  <div class="sidebar">
    <h2>Dashboard</h2>
    <a href="#" class="active">📊 Overview</a>
<a href="#">📈 Analytics</a>
<a href="#">📄 Reports</a>
    <a href="index.html" class="back-btn">← Portfolio</a>
  </div>

  <div class="main">

    <div class="topbar">
      <h3>Dashboard</h3>
      <div class="user">
        <span class="toggle" onclick="toggleDark()">🌙</span>
        <img src="https://i.pravatar.cc/30">
        <span>Arun</span>
      </div>
    </div>

    <div class="cards">
      <div class="card"><h4>Users</h4><h2>1245</h2></div>
      <div class="card"><h4>Revenue</h4><h2>$12k</h2></div>
      <div class="card"><h4>Churn</h4><h2>3%</h2></div>
    </div>

    <div class="charts">
      <div class="chart"><canvas id="sales"></canvas></div>
      <div class="chart"><canvas id="users"></canvas></div>
    </div>

    <div class="table">
      <h3>Transactions</h3>
      <input type="text" id="search" placeholder="Search..." onkeyup="filterTable()">
      <table id="dataTable">
        <tr><th>User</th><th>Amount</th><th>Status</th></tr>
        <tr><td>Arun</td><td>$120</td><td>Paid</td></tr>
        <tr><td>John</td><td>$80</td><td>Pending</td></tr>
        <tr><td>Meena</td><td>$250</td><td>Paid</td></tr>
      </table>
    </div>

  </div>
</div>

<script>
new Chart(document.getElementById('sales'),{
  type:'line',data:{labels:['Jan','Feb','Mar','Apr'],datasets:[{data:[5,7,10,14],borderColor:'#4f46e5'}]}
});

new Chart(document.getElementById('users'),{
  type:'bar',data:{labels:['Jan','Feb','Mar','Apr'],datasets:[{data:[200,400,800,1200],backgroundColor:'#06b6d4'}]}
});

function toggleDark(){ document.body.classList.toggle('dark'); }

function filterTable(){
  let input=document.getElementById('search').value.toLowerCase();
  let rows=document.querySelectorAll('#dataTable tr');
  rows.forEach((row,i)=>{
    if(i===0)return;
    row.style.display=row.innerText.toLowerCase().includes(input)?'':'none';
  });
}
</script>

</body>
</html>
