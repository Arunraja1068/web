<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Commerce UI</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      background: #f9f9f9;
      color: #333;
    }

    /* Navbar */
    nav {
      background: #0066ff;
      color: #fff;
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    nav h1 { font-size: 1.5rem; }
    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
      margin: 0;
      padding: 0;
    }
    nav ul li a {
      color: #fff;
      text-decoration: none;
      font-weight: 500;
      cursor: pointer;
    }
    nav ul li a:hover { text-decoration: underline; }

    /* Hero Banner */
    .hero {
      text-align: center;
      padding: 60px 20px;
      background: linear-gradient(120deg, #0066ff, #4b0082);
      color: #fff;
    }
    .hero h2 { font-size: 2.5rem; margin-bottom: 10px; }
    .hero p { font-size: 1.2rem; }

    /* Product Grid */
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 40px;
    }
    .product {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.08);
      padding: 20px;
      text-align: center;
      transition: transform 0.3s;
    }
    .product:hover { transform: translateY(-5px); }
    .product img {
      max-width: 100%;
      border-radius: 8px;
    }
    .product h3 { margin: 15px 0 10px; color: #0066ff; }
    .product p { margin: 5px 0; }
    .btn {
      display: inline-block;
      padding: 10px 20px;
      background: #0066ff;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
    }
    .btn:hover { background: #004bb5; }

    /* Cart Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      width: 90%;
      max-width: 500px;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .close {
      cursor: pointer;
      font-size: 1.2rem;
      font-weight: bold;
    }
    .cart-items {
      margin-top: 20px;
    }
    .cart-items p {
      margin: 10px 0;
      border-bottom: 1px solid #ddd;
      padding-bottom: 5px;
    }

    /* Footer */
    footer {
      background: #222;
      color: #bbb;
      text-align: center;
      padding: 20px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav>
    <h1>ShopEase</h1>
    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#">Products</a></li>
      <li><a id="cartBtn">Cart 🛒</a></li>
    </ul>
  </nav>

  <!-- Hero Banner -->
  <div class="hero">
    <h2>Welcome to ShopEase</h2>
    <p>Find the best deals on your favorite products</p>
  </div>

  <!-- Product Grid -->
  <section class="products">
    <div class="product">
      <img src="https://via.placeholder.com/250x200" alt="Product 1">
      <h3>Wireless Headphones</h3>
      <p>$59.99</p>
      <button class="btn add-to-cart">Add to Cart</button>
    </div>
    <div class="product">
      <img src="https://via.placeholder.com/250x200" alt="Product 2">
      <h3>Smart Watch</h3>
      <p>$129.99</p>
      <button class="btn add-to-cart">Add to Cart</button>
    </div>
    <div class="product">
      <img src="https://via.placeholder.com/250x200" alt="Product 3">
      <h3>Bluetooth Speaker</h3>
      <p>$39.99</p>
      <button class="btn add-to-cart">Add to Cart</button>
    </div>
  </section>

  <!-- Cart Modal -->
  <div class="modal" id="cartModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Your Cart</h3>
        <span class="close" id="closeModal">&times;</span>
      </div>
      <div class="cart-items" id="cartItems">
        <p>No items in cart.</p>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <p>© 2026 ShopEase | All rights reserved</p>
  </footer>

  <!-- JavaScript -->
  <script>
    const cartBtn = document.getElementById('cartBtn');
    const cartModal = document.getElementById('cartModal');
    const closeModal = document.getElementById('closeModal');
    const cartItems = document.getElementById('cartItems');
    const addButtons = document.querySelectorAll('.add-to-cart');

    let cart = [];

    // Open cart modal
    cartBtn.addEventListener('click', () => {
      cartModal.style.display = 'flex';
      renderCart();
    });

    // Close cart modal
    closeModal.addEventListener('click', () => {
      cartModal.style.display = 'none';
    });

    // Add to cart
    addButtons.forEach((btn, index) => {
      btn.addEventListener('click', () => {
        const product = btn.parentElement.querySelector('h3').textContent;
        const price = btn.parentElement.querySelector('p').textContent;
        cart.push({ product, price });
        alert("✅ " + product + " added to cart!");
      });
    });

    // Render cart items
    function renderCart() {
      if (cart.length === 0) {
        cartItems.innerHTML = "<p>No items in cart.</p>";
      } else {
        cartItems.innerHTML = cart.map(item => `<p>${item.product} - ${item.price}</p>`).join("");
      }
    }
  </script>

</body>
</html>
